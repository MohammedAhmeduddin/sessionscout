name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff black
      - run: ruff check src/ tests/ scripts/
      - run: black --check src/ tests/ scripts/

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run data pipeline tests
        run: pytest tests/test_sequences.py -v --tb=short

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        run: |
          pip install pytest-cov
          pytest tests/test_sequences.py \
            --cov=sessionscout \
            --cov-report=xml \
            --cov-report=term-missing

  validate:
    name: Validate imports and architecture
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .

      - name: Config loads correctly
        run: |
          python -c "
          from sessionscout.config import cfg, VOCAB
          assert cfg.vocab.size == 6
          assert cfg.sequence.max_len == 64
          print('Config OK — vocab:', list(VOCAB.values()))
          "

      - name: Feature imports work
        run: |
          python -c "
          from sessionscout.features import (
              build_session_sequence,
              inject_gap_tokens,
          )
          print('Feature imports OK')
          "

      - name: Model architecture loads
        run: |
          python -c "
          import torch
          from sessionscout.model.lstm import SessionLSTM
          from sessionscout.model.transformer import SessionTransformer
          from sessionscout.config import cfg

          lstm = SessionLSTM()
          tf   = SessionTransformer()

          ids  = torch.randint(1, cfg.vocab.size, (2, cfg.sequence.max_len))
          mask = (ids != cfg.vocab.pad).float()

          assert lstm(ids, mask).shape == (2,)
          assert tf(ids, mask).shape   == (2,)
          print(f'LSTM: {sum(p.numel() for p in lstm.parameters()):,} params OK')
          print(f'Transformer: {sum(p.numel() for p in tf.parameters()):,} params OK')
          "
